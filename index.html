<!DOCTYPE html>
<html>
<head>
<title>Quick Rental Malta</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#111;
color:white;
}

/* GOLD COLOR */
:root{
--gold:#d4af37;
}

/* HEADER */
header{
background:#000;
text-align:center;
padding:25px;
border-bottom:2px solid var(--gold);
}

header h1{
font-size:38px;
color:var(--gold);
letter-spacing:2px;
}

header p{
margin-top:8px;
color:#ccc;
}

/* HERO */
.hero{
height:85vh;
background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:50px;
font-weight:bold;
text-shadow:2px 2px 20px black;
}

/* SECTION */
.section{
max-width:1200px;
margin:auto;
padding:70px 20px;
text-align:center;
}

.section h2{
color:var(--gold);
margin-bottom:40px;
font-size:30px;
}

/* CARS */
.cars{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.car{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:0.3s;
border:1px solid #222;
}

.car:hover{
transform:translateY(-8px);
}

.car img{
width:100%;
height:220px;
object-fit:cover;
}

.car-content{
padding:20px;
}

.price{
color:var(--gold);
margin:10px 0;
font-weight:bold;
}

button{
background:var(--gold);
color:black;
border:none;
padding:12px 28px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* BOOKING FORM */
form{
max-width:600px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input, select{
padding:12px;
border:none;
border-radius:6px;
}

/* MAP */
iframe{
width:100%;
height:400px;
border:0;
border-radius:12px;
}

/* FOOTER */
footer{
background:#000;
text-align:center;
padding:25px;
border-top:2px solid var(--gold);
margin-top:60px;
}

/* WHATSAPP BUTTON */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 18px;
border-radius:50px;
font-weight:bold;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<header>
<h1>Quick Rental</h1>
<p>Luxury Car Hire – Airport Pickup or Delivery Malta & Gozo</p>
</header>

<div class="hero">
Drive Malta With Style
</div>

<div class="section">
<h2>Our Cars</h2>

<div class="cars">

<div class="car">
<img src="https://images.unsplash.com/photo-1603386329225-868f9b1ee6b9">
<div class="car-content">
<h3>Toyota Aygo</h3>
<p class="price">From €25/day</p>
<button onclick="scrollToBooking()">Book Now</button>
</div>
</div>

<div class="car">
<img src="https://images.unsplash.com/photo-1549921296-3a6b7c3a8d8b">
<div class="car-content">
<h3>Toyota Yaris</h3>
<p class="price">From €30/day</p>
<button onclick="scrollToBooking()">Book Now</button>
</div>
</div>

<div class="car">
<img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d">
<div class="car-content">
<h3>Volkswagen Polo</h3>
<p class="price">From €35/day</p>
<button onclick="scrollToBooking()">Book Now</button>
</div>
</div>

</div>
</div>

<div class="section" id="booking">
<h2>Book Your Car</h2>

<form action="https://wa.me/35677038260" target="_blank">
<input type="text" placeholder="Full Name" required>
<input type="date" required>
<input type="date" required>
<select>
<option>Airport Pickup</option>
<option>Delivery Malta</option>
<option>Delivery Gozo</option>
</select>
<button type="submit">Send Booking Request</button>
</form>

</div>

<div class="section">
<h2>Our Location</h2>
<iframe 
src="https://www.google.com/maps?q=Malta+International+Airport&output=embed">
</iframe>
</div>

<footer>
© 2026 Quick Rental Malta | WhatsApp: +35677038260
</footer>

<a class="whatsapp" href="https://wa.me/35677038260" target="_blank">
WhatsApp Us
</a>

<script>
function scrollToBooking(){
document.getElementById("booking").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
