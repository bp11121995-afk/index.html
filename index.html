<!DOCTYPE html>
<html>
<head>
<title>EZ Car Rental Malta</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f2f2f2;
}

/* HEADER */
header{
background:#000;
color:#fff;
text-align:center;
padding:25px;
}

header h1{
font-size:34px;
margin-bottom:8px;
}

header p{
opacity:0.8;
}

/* HERO */
.hero{
height:85vh;
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:50px;
font-weight:bold;
text-shadow:2px 2px 20px rgba(0,0,0,0.7);
text-align:center;
}

/* SECTION */
.section{
max-width:1200px;
margin:auto;
padding:70px 20px;
text-align:center;
}

.section h2{
font-size:28px;
margin-bottom:50px;
}

/* GRID */
.cars{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:35px;
}

/* CARD */
.car{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
transition:0.3s;
}

.car:hover{
transform:translateY(-8px);
}

.car img{
width:100%;
height:220px;
object-fit:cover;
}

.car-content{
padding:20px;
}

.car h3{
font-size:22px;
margin-bottom:10px;
}

.price{
margin-bottom:15px;
color:#555;
}

button{
background:black;
color:white;
border:none;
padding:12px 28px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#333;
}

/* FOOTER */
footer{
background:#000;
color:white;
text-align:center;
padding:25px;
margin-top:70px;
}
</style>
</head>

<body>

<header>
<h1>EZ Car Rental Malta</h1>
<p>Affordable & Reliable Car Hire</p>
</header>

<div class="hero">
Drive Malta With Us
</div>

<div class="section">
<h2>Our Cars</h2>

<div class="cars">

<div class="car">
<img src="https://images.unsplash.com/photo-1603386329225-868f9b1ee6b9">
<div class="car-content">
<h3>Toyota Aygo</h3>
<p class="price">From €25/day</p>
<button>Book Now</button>
</div>
</div>

<div class="car">
<img src="https://images.unsplash.com/photo-1549921296-3a6b7c3a8d8b">
<div class="car-content">
<h3>Toyota Yaris</h3>
<p class="price">From €30/day</p>
<button>Book Now</button>
</div>
</div>

<div class="car">
<img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d">
<div class="car-content">
<h3>Volkswagen Polo</h3>
<p class="price">From €35/day</p>
<button>Book Now</button>
</div>
</div>

<div class="car">
<img src="https://images.unsplash.com/photo-1597007030739-6d2e2b7f3e5a">
<div class="car-content">
<h3>Nissan Qashqai</h3>
<p class="price">From €45/day</p>
<button>Book Now</button>
</div>
</div>

<div class="car">
<img src="https://images.unsplash.com/photo-1519643381401-22c77e60520e">
<div class="car-content">
<h3>Peugeot 5008</h3>
<p class="price">From €55/day</p>
<button>Book Now</button>
</div>
</div>

<div class="car">
<img src="https://images.unsplash.com/photo-1583267746897-2cf415887172">
<div class="car-content">
<h3>Peugeot Expert</h3>
<p class="price">From €60/day</p>
<button>Book Now</button>
</div>
</div>

</div>
</div>

<footer>
© 2026 EZ Car Rental Malta
</footer>

</body>
</html>
