<!DOCTYPE html>
<html>
<head>
<title>Quick Rental Malta</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
color:#fff;
}

#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

:root{ --gold:#d4af37; }

header{
text-align:center;
padding:20px;
border-bottom:1px solid #222;
}

h1{color:var(--gold);}

/* INFO LINE */
.info-line{
text-align:center;
color:#aaa;
font-size:14px;
margin-top:-10px;
padding:0 15px;
}

/* CARS */
.cars{
max-width:900px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:0 15px;
}

.car{
background:rgba(17,17,17,0.9);
padding:15px;
border-radius:10px;
text-align:center;
border:1px solid #222;
}

.price{
color:var(--gold);
font-weight:bold;
font-size:18px;
margin-top:8px;
}

/* BOOKING */
.booking{
max-width:650px;
margin:40px auto;
padding:20px;
background:rgba(17,17,17,0.9);
border-radius:10px;
}

.plan-buttons{
display:flex;
gap:10px;
margin-bottom:15px;
}

.plan-btn{
flex:1;
padding:12px;
border:none;
cursor:pointer;
background:#111;
color:#fff;
border:1px solid #333;
border-radius:8px;
font-weight:bold;
}

.plan-btn.active{
background:var(--gold);
color:#000;
}

input,select{
width:100%;
padding:14px;
margin:10px 0;
background:#fff;
border:1px solid #ccc;
color:#000;
border-radius:6px;
font-size:16px;
}

button{
background:var(--gold);
border:none;
padding:12px;
width:100%;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.result{
margin-top:10px;
color:var(--gold);
line-height:1.6;
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop playsinline id="bgVideo">
<source src="https://cdn.coverr.co/videos/coverr-driving-through-a-tunnel-1578/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<header>
<h1>QUICK RENTAL MALTA</h1>
</header>

<!-- 🔥 NEW INFO LINE -->
<p class="info-line">
🚗 Delivery across Malta & Gozo • Hassle-free rental experience • We bring the car to your location
</p>

<!-- CARS -->
<div class="cars">

<div class="car">Aygo <div class="price" id="c0">€25/day</div></div>
<div class="car">Yaris <div class="price" id="c1">€30/day</div></div>
<div class="car">Polo <div class="price" id="c2">€35/day</div></div>
<div class="car">Qashqai <div class="price" id="c3">€45/day</div></div>

</div>

<!-- BOOKING -->
<div class="booking">

<!-- PLAN BUTTONS -->
<div class="plan-buttons">
<button class="plan-btn" id="pbtn1" onclick="setPlan(1)">Option 1</button>
<button class="plan-btn" id="pbtn2" onclick="setPlan(2)">Option 2</button>
<button class="plan-btn" id="pbtn3" onclick="setPlan(3)">Option 3</button>
</div>

<input id="name" placeholder="Full Name">

<label>Pick-up Date</label>
<input type="date" id="pickup">

<label>Drop-off Date</label>
<input type="date" id="dropoff">

<input id="delivery" placeholder="Hotel / Airport / Address">

<select id="car">
<option value="0">Aygo</option>
<option value="1">Yaris</option>
<option value="2">Polo</option>
<option value="3">Qashqai</option>
</select>

<button onclick="calc()">Calculate Price</button>

<div class="result" id="result"></div>

<button onclick="whatsapp()">WhatsApp Booking</button>

</div>

<script>

let plan=null;
let prices=[];

/* PLAN */
function setPlan(p){
plan=p;

document.getElementById("pbtn1").classList.remove("active");
document.getElementById("pbtn2").classList.remove("active");
document.getElementById("pbtn3").classList.remove("active");

if(p==1) document.getElementById("pbtn1").classList.add("active");
if(p==2) document.getElementById("pbtn2").classList.add("active");
if(p==3) document.getElementById("pbtn3").classList.add("active");

let start=4;
if(p==2) start=11;
if(p==3) start=25;

prices=[];
for(let i=0;i<4;i++){
prices[i]=start;
document.getElementById("c"+i).innerText="€"+prices[i]+"/day";
}
}

/* CALC */
function calc(){

if(!plan){
alert("Please select a plan first");
return;
}

let car=parseInt(document.getElementById("car").value);

let a=new Date(document.getElementById("pickup").value);
let b=new Date(document.getElementById("dropoff").value);

let days=(b-a)/(1000*60*60*24);

if(!days || days<=0){
document.getElementById("result").innerText="Select valid dates";
return;
}

let total = prices[car] * days;

let delivery=document.getElementById("delivery").value;

document.getElementById("result").innerHTML =
"Plan: Option "+plan+"<br>"+
"Days: "+days+"<br>"+
"Price/day: €"+prices[car]+"<br>"+
"Delivery: "+delivery+"<br><br>"+
"<b>Total: €"+total.toFixed(2)+"</b>";
}

/* WHATSAPP */
function whatsapp(){

if(!plan){
alert("Select a plan first");
return;
}

let name=document.getElementById("name").value;
let car=document.getElementById("car").options[document.getElementById("car").selectedIndex].text;
let pickup=document.getElementById("pickup").value;
let dropoff=document.getElementById("dropoff").value;
let delivery=document.getElementById("delivery").value;

let msg=
"Plan: Option "+plan+
"%0AName: "+name+
"%0ACar: "+car+
"%0APickup: "+pickup+
"%0ADropoff: "+dropoff+
"%0ADelivery: "+delivery;

window.open("https://wa.me/35677038260?text="+msg);
}

/* DEFAULT */
window.onload=function(){
setPlan(1);
};

</script>

</body>
</html>
