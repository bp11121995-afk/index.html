<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quick Car Rental</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#0f0f0f;
  color:#eee;
}

header{
  background:linear-gradient(90deg,#000,#222);
  text-align:center;
  padding:30px;
}

.logo{
  font-size:34px;
  font-weight:bold;
}

.tagline{color:#bbb;font-size:13px;margin-top:5px}
.location{color:#888;font-size:12px}

section{
  max-width:1100px;
  margin:20px auto;
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
}

.booking-box input, .booking-box select{
  padding:10px;
  margin:5px;
  border-radius:6px;
  border:none;
}

.cars{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-top:20px;
}

.car{
  background:#222;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.price{
  color:#00ff88;
  font-size:18px;
  font-weight:bold;
}

.summary{
  margin-top:10px;
  padding:10px;
  background:#111;
  border-radius:8px;
  font-size:14px;
  color:#ccc;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#00ff88;
  color:#000;
  font-weight:bold;
}

.map{
  width:100%;
  height:300px;
  border:0;
  border-radius:10px;
}

.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <div class="logo">Quick Car Rental</div>
  <div class="tagline">Fast • Cheap • Reliable</div>
  <div class="location">📍 Senglea, Malta</div>
</header>

<section>
  <h2>📅 Step 1: Choose Details</h2>

  <div class="booking-box">
    <input type="date" id="start">
    <input type="date" id="end">

    <select id="serviceType">
      <option value="Airport Pickup">✈ Airport Pickup</option>
      <option value="Delivery">🚗 Delivery</option>
    </select>

    <select id="insurance">
      <option value="No Insurance">❌ No Insurance</option>
      <option value="Insurance Included">🛡 Insurance Included (+€5/day)</option>
    </select>

    <input type="text" id="location" placeholder="Location (optional)">

    <button onclick="showCars()">Show Cars</button>

    <div class="summary" id="summary"></div>
  </div>
</section>

<section id="carsSection" style="display:none;">
  <h2>🚗 Available Cars</h2>
  <div class="cars" id="cars"></div>
</section>

<section>
<h2>📍 Map</h2>
<iframe class="map" src="https://www.google.com/maps?q=35.8880661,14.5171061&z=15&output=embed"></iframe>
</section>

<a class="whatsapp" href="https://wa.me/3560000000" target="_blank">WhatsApp</a>

<script>
const basePrice = 24;

let cars=[
 {name:"Economy"},
 {name:"Compact"},
 {name:"Hatchback"},
 {name:"Sedan"},
 {name:"SUV"},
 {name:"Luxury"}
];

function getDays(){
 let s=document.getElementById('start').value;
 let e=document.getElementById('end').value;
 if(!s||!e)return 1;
 let d1=new Date(s);
 let d2=new Date(e);
 return Math.max(1,(d2-d1)/(1000*60*60*24));
}

function showCars(){
 document.getElementById('carsSection').style.display="block";

 let days=getDays();
 let insurance=document.getElementById('insurance').value;
 let insuranceCost = (insurance === "Insurance Included") ? 5 : 0;

 let pricePerDay = basePrice + insuranceCost;
 let minTotal = pricePerDay * days;

 document.getElementById('summary').innerHTML = 
 `📊 Summary: ${days} day(s) | ${insurance} | From €${pricePerDay}/day | Estimated total from €${minTotal}`;

 let box=document.getElementById('cars');
 box.innerHTML="";

 cars.forEach(c=>{
  let total = pricePerDay * days;

  box.innerHTML += `
  <div class='car'>
    <h3>${c.name}</h3>
    <p class='price'>€${pricePerDay}/day</p>
    <p><b>Total Price: €${total}</b></p>
    <button onclick="book('${c.name}',${pricePerDay})">Book via WhatsApp</button>
  </div>
  `;
 });
}

function book(car,price){
 let days=getDays();
 let insurance=document.getElementById('insurance').value;
 let type=document.getElementById('serviceType').value;
 let loc=document.getElementById('location').value;

 let total=days*price;

 let msg=`Booking:%0ACar: ${car}%0ADays: ${days}%0AService: ${type}%0AInsurance: ${insurance}%0ALocation: ${loc}%0ATotal Price: €${total}`;

 window.open(`https://wa.me/3560000000?text=${msg}`,'_blank');
}
</script>

</body>
</html>
